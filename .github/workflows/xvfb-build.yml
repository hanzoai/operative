name: Build xvfb Base Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.xvfb'

permissions:
  contents: read
  packages: write

concurrency:
  group: xvfb-${{ github.ref }}
  cancel-in-progress: false

jobs:
  xvfb:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/xvfb
      context: .
      dockerfile: docker/Dockerfile.xvfb
      platforms: "linux/amd64"
    secrets: inherit
