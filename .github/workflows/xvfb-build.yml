name: Build xvfb Base Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.xvfb'

permissions:
  contents: read
  packages: write

concurrency:
  group: xvfb-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-amd64:
    runs-on: hanzo-build-linux-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.xvfb
          platforms: linux/amd64
          tags: |
            ghcr.io/hanzoai/xvfb:latest
            ghcr.io/hanzoai/xvfb:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/hanzoai/xvfb-cache:amd64
          cache-to: type=registry,ref=ghcr.io/hanzoai/xvfb-cache:amd64,mode=max
          provenance: false
          push: true
