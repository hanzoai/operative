name: Docker Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/operative
      context: .
      dockerfile: docker/Dockerfile
      platforms: "linux/amd64"
      deploy: true
      deploy-deployment: visor
      deploy-namespace: hanzo
    secrets: inherit
